# Blueprint Render — Homologação + Produção (2 branches, mesmo repo)
#
# Portal único (produção): https://wms.docalivre.com.br/
# Homologação: branch homolog → https://ultrafrio-homologacao.onrender.com (auto deploy)
# Produção:    branch main → https://wms.docalivre.com.br
# Importante: se Auto Deploy estiver OFF no serviço ultrafrio-producao,
# rode Manual Deploy + Clear build cache no Render após push em main.

# VITE_WMS_PRO_URL: login/SSO chama o Pro (prod ↔ prod, homolog ↔ homolog).
services:
  - type: web
    name: ultrafrio-homologacao
    runtime: static
    branch: homolog
    autoDeployTrigger: commit
    buildCommand: npm ci --no-audit --no-fund && node scripts/write-supabase-config.mjs && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_WMS_PRO_URL
        value: https://doca-livre-wms-pro-homologacao.onrender.com/
      - key: VITE_WMS_LIGHT_URL
        value: https://doca-livre-wms-light-homolog.onrender.com/

  - type: web
    name: ultrafrio-producao
    runtime: static
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm ci --no-audit --no-fund && node scripts/write-supabase-config.mjs && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_WMS_PRO_URL
        value: https://doca-livre-wms-pro.onrender.com/
      - key: VITE_WMS_LIGHT_URL
        value: https://doca-livre-wms-light.onrender.com/
