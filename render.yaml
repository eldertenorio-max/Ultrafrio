# Blueprint Render — Homologação + Produção (2 branches, mesmo repo)
#
# Homologação: branch homolog → https://ultrafrio-homologacao.onrender.com (auto deploy)
# Produção:    branch main     → https://wms.docalivre.com.br (manual deploy)
#
# Mesmo Supabase nos dois (public/supabase-config.json + VITE_SUPABASE_* idênticas).
# VITE_WMS_PRO_URL: portal SSO verifica token neste Pro (prod ↔ prod, homolog ↔ homolog).
services:
  - type: web
    name: ultrafrio-homologacao
    runtime: static
    branch: homolog
    autoDeployTrigger: commit
    buildCommand: npm ci --no-audit --no-fund && node scripts/write-supabase-config.mjs && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_WMS_PRO_URL
        value: https://doca-livre-wms-pro-homologacao.onrender.com/

  - type: web
    name: ultrafrio-producao
    runtime: static
    branch: main
    autoDeployTrigger: off
    buildCommand: npm ci --no-audit --no-fund && node scripts/write-supabase-config.mjs && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_WMS_PRO_URL
        value: https://doca-livre-wms-pro.onrender.com/
