# Blueprint Render — Homologação + Produção (mesmo repositório)
#
# Homologação: https://ultrafrio.onrender.com — deploy automático a cada push
# Produção:    https://wms.docalivre.com.br — deploy manual (Auto Deploy desligado)
#
# Com Supabase configurado no Render, os dados persistem na nuvem.
# Recomendado: Supabase separado para homologação e produção.
services:
  - type: web
    name: ultrafrio-homologacao
    runtime: static
    buildCommand: npm ci --no-audit --no-fund && node scripts/write-supabase-config.mjs && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: VITE_APP_AMBIENTE
        value: homolog
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

  - type: web
    name: ultrafrio-producao
    runtime: static
    buildCommand: npm ci --no-audit --no-fund && node scripts/write-supabase-config.mjs && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: VITE_APP_AMBIENTE
        value: producao
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
